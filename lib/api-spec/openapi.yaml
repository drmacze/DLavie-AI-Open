openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: DLavie OS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Project management
  - name: files
    description: File management
  - name: ai
    description: AI assistant operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/recent:
    get:
      operationId: listRecentProjects
      tags: [projects]
      summary: Get recently accessed projects
      responses:
        "200":
          description: Recent projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/{projectId}/stats:
    get:
      operationId: getProjectStats
      tags: [projects]
      summary: Get project statistics
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectStats"

  /projects/{projectId}/files:
    get:
      operationId: listFiles
      tags: [files]
      summary: List files in a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/File"
    post:
      operationId: createFile
      tags: [files]
      summary: Create a new file in a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileInput"
      responses:
        "201":
          description: Created file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/File"

  /projects/{projectId}/files/{fileId}:
    get:
      operationId: getFile
      tags: [files]
      summary: Get a file's content
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: fileId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: File
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/File"
        "404":
          description: Not found
    put:
      operationId: updateFile
      tags: [files]
      summary: Update a file's content
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: fileId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileUpdate"
      responses:
        "200":
          description: Updated file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/File"
    delete:
      operationId: deleteFile
      tags: [files]
      summary: Delete a file
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: fileId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/{projectId}/messages:
    get:
      operationId: listMessages
      tags: [ai]
      summary: Get AI chat history for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Chat messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

  /ai/chat:
    post:
      operationId: sendChatMessage
      tags: [ai]
      summary: Send a message to the AI assistant and get a response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatInput"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /ai/complete:
    post:
      operationId: getAiCompletion
      tags: [ai]
      summary: Get AI code completion/suggestion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompletionInput"
      responses:
        "200":
          description: AI completion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompletionResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Project:
      type: object
      required: [id, name, language, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        language:
          type: string
        lastAccessedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    ProjectInput:
      type: object
      required: [name, language]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        language:
          type: string

    ProjectUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        language:
          type: string

    ProjectStats:
      type: object
      required: [fileCount, totalLines, languages]
      properties:
        fileCount:
          type: integer
        totalLines:
          type: integer
        languages:
          type: array
          items:
            $ref: "#/components/schemas/LanguageStat"

    LanguageStat:
      type: object
      required: [language, fileCount, percentage]
      properties:
        language:
          type: string
        fileCount:
          type: integer
        percentage:
          type: number

    File:
      type: object
      required: [id, projectId, name, path, content, language, createdAt, updatedAt]
      properties:
        id:
          type: integer
        projectId:
          type: integer
        name:
          type: string
        path:
          type: string
        content:
          type: string
        language:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    FileInput:
      type: object
      required: [name, path, language]
      properties:
        name:
          type: string
          minLength: 1
        path:
          type: string
        content:
          type: string
        language:
          type: string

    FileUpdate:
      type: object
      properties:
        name:
          type: string
        content:
          type: string
        language:
          type: string

    Message:
      type: object
      required: [id, projectId, role, content, createdAt]
      properties:
        id:
          type: integer
        projectId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string

    ChatInput:
      type: object
      required: [projectId, message]
      properties:
        projectId:
          type: integer
        message:
          type: string
        context:
          type: ["string", "null"]

    CompletionInput:
      type: object
      required: [code, language]
      properties:
        code:
          type: string
        language:
          type: string
        cursorPosition:
          type: ["integer", "null"]

    CompletionResult:
      type: object
      required: [suggestion]
      properties:
        suggestion:
          type: string
        explanation:
          type: ["string", "null"]
